        border-radius: 6px;
        background: #fff;
        cursor: pointer;
      }
      .painel a.botao {

        width: 100%;

        margin-top: 8px;
        padding: 7px 9px;

        border-radius: 6px;
        background: #fff;
        color: #1f2937;
        text-align: center;
        text-decoration: none;
        font-size: 13px;
      }
      .painel a.botao:hover,
      .painel button:hover {
        background: #f3f4f6;
      }
    </style>
